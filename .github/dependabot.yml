version: 2
updates:
  # ── Backend (FastAPI / Python) ────────────────────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    labels: ["deps", "backend"]
    groups:
      # Group patch + minor bumps so we don't drown in PRs.
      patch-and-minor:
        update-types: ["patch", "minor"]

  # ── Frontend (Vite / React) ───────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    labels: ["deps", "frontend"]
    groups:
      patch-and-minor:
        update-types: ["patch", "minor"]
    ignore:
      # React 19 is brand new; avoid auto-PRing major bumps until things settle.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions versions ──────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: ["deps", "ci"]
